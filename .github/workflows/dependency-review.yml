name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        # This repository may not have GitHub Dependency Graph enabled.
        # Keep dependency review advisory so portfolio PRs are not blocked by
        # repository security-feature availability.
        continue-on-error: true
